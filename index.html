<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>4M Glass</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #0b3c5d, #ff7a00);
      color: white;
      text-align: center;
    }

    .container {
      padding: 40px 20px;
    }

    .logo {
      width: 180px;
      margin-bottom: 20px;
    }

    h1 {
      margin: 10px 0;
      font-size: 28px;
    }

    p {
      color: #e5e7eb;
      margin-bottom: 30px;
    }

    .btn {
      display: block;
      margin: 12px auto;
      padding: 15px;
      width: 80%;
      max-width: 300px;
      border-radius: 12px;
      text-decoration: none;
      font-weight: bold;
      transition: 0.3s;
    }

    .whatsapp { background: #25D366; color: white; }
    .call { background: #0b3c5d; color: white; }
    .instagram { background: #ff7a00; color: white; }
    .email { background: #374151; color: white; }

    .btn:hover {
      transform: scale(1.05);
      opacity: 0.9;
    }
  </style>
</head>

<body>
  <div class="container">

    <!-- LOGO -->
    <img src="logo.png" alt="4M Glass Logo" class="logo">

    <h1>4M Glass</h1>
    <p>Solución en Cristal</p>

    <!-- BOTONES -->
    <a class="btn whatsapp" href="https://wa.me/56954595120" target="_blank">
      WhatsApp
    </a>

    <a class="btn call" href="tel:+56954595120">
      Llamar
    </a>

    <a class="btn instagram" href="https://www.instagram.com/4m_glass/" target="_blank">
      Instagram
    </a>

    <a class="btn email" href="mailto:michel4mglass@hotmail.com">
      Correo
    </a>

  </div>
</body>
</html>
